<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>akifs38</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c63ff, #3ecfcf);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }

        .name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .bio {
            font-size: 14px;
            color: #888;
            margin-bottom: 32px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: block;
            padding: 14px 20px;
            border-radius: 12px;
            background: #1a1a1a;
            color: #fff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            border: 1px solid #2a2a2a;
            transition: background 0.2s, transform 0.15s;
        }

        .link-btn:hover {
            background: #252525;
            transform: translateY(-2px);
        }

        .link-btn .icon {
            margin-right: 10px;
        }

        .footer {
            margin-top: 36px;
            font-size: 12px;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">👤</div>
        <div class="name">akifs38</div>
        <div class="bio">Biyografinizi buraya yazın</div>

        <div class="links">
            <a href="#" class="link-btn"><span class="icon">🐙</span> GitHub</a>
            <a href="#" class="link-btn"><span class="icon">📸</span> Instagram</a>
            <a href="#" class="link-btn"><span class="icon">🐦</span> Twitter / X</a>
            <a href="#" class="link-btn"><span class="icon">💼</span> LinkedIn</a>
            <a href="#" class="link-btn"><span class="icon">✉️</span> İletişim</a>
        </div>

        <div class="footer">© 2025 akifs38</div>
    </div>
</body>
</html>
