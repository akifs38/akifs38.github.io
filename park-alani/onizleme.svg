<svg xmlns="http://www.w3.org/2000/svg" width="420" height="470" viewBox="0 0 420 470" font-family="system-ui, Arial">
  <text x="210" y="26" font-size="16" font-weight="800" text-anchor="middle">Park Alanı — düz zemin + beyaz kabartma çizgiler</text>
  <text x="210" y="44" font-size="11" fill="#555" text-anchor="middle">koyu = düz zemin (1. filament) · beyaz = kabartma çizgiler (2. filament) · şerit kesikli</text>
  <g transform="translate(10,60) scale(2.0)">
    <rect x="0" y="0" width="200" height="200" fill="#2b2b2b"/>
    <g fill="#f3f3f3">
      <!-- çerçeve -->
      <rect x="6" y="6"   width="188" height="3"/>
      <rect x="6" y="191" width="188" height="3"/>
      <rect x="6" y="6"   width="3"   height="188"/>
      <rect x="191" y="6" width="3"   height="188"/>
      <!-- park gözü bölücüleri (dikey, üst şerit) -->
      <rect x="51.5"  y="6" width="3" height="55"/>
      <rect x="98.5"  y="6" width="3" height="55"/>
      <rect x="145.5" y="6" width="3" height="55"/>
      <!-- park / şerit ayıracı -->
      <rect x="6" y="59.5" width="188" height="3"/>
      <!-- şerit orta çizgisi (KESİKLİ) -->
      <rect x="10"  y="126" width="12" height="3"/>
      <rect x="30"  y="126" width="12" height="3"/>
      <rect x="50"  y="126" width="12" height="3"/>
      <rect x="70"  y="126" width="12" height="3"/>
      <rect x="90"  y="126" width="12" height="3"/>
      <rect x="110" y="126" width="12" height="3"/>
      <rect x="130" y="126" width="12" height="3"/>
      <rect x="150" y="126" width="12" height="3"/>
      <rect x="170" y="126" width="12" height="3"/>
    </g>
    <text x="28"  y="36" font-size="7" text-anchor="middle" fill="#666">park</text>
    <text x="75"  y="36" font-size="7" text-anchor="middle" fill="#666">park</text>
    <text x="122" y="36" font-size="7" text-anchor="middle" fill="#666">park</text>
    <text x="169" y="36" font-size="7" text-anchor="middle" fill="#666">park</text>
  </g>
</svg>
