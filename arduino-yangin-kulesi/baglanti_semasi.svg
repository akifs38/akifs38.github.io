<svg xmlns="http://www.w3.org/2000/svg" width="900" height="660" viewBox="0 0 900 660" font-family="system-ui, Arial, sans-serif">
  <rect width="900" height="660" fill="#0e1726"/>
  <text x="450" y="34" fill="#e7eefc" font-size="20" font-weight="800" text-anchor="middle">Arduino Yangın Kulesi — Bağlantı Şeması</text>
  <text x="450" y="56" fill="#91a3c4" font-size="12" text-anchor="middle">Kırmızı = +5V · Siyah = GND · Renkli = sinyal · Servo/Pompa AYRI 5V'tan, GND ortak</text>

  <!-- Arduino UNO -->
  <rect x="70" y="120" width="200" height="380" rx="12" fill="#13314a" stroke="#3da9fc" stroke-width="2"/>
  <text x="170" y="150" fill="#cfe2ff" font-size="18" font-weight="800" text-anchor="middle">Arduino UNO</text>
  <!-- pin labels (right edge) -->
  <g font-size="13" fill="#e7eefc" font-weight="700" text-anchor="end">
    <text x="258" y="190">D9</text>
    <text x="258" y="225">D10</text>
    <text x="258" y="260">A0</text>
    <text x="258" y="295">D2</text>
    <text x="258" y="330">D7</text>
    <text x="258" y="365">D5</text>
    <text x="258" y="400">D6</text>
    <text x="258" y="450">5V</text>
    <text x="258" y="480">GND</text>
  </g>
  <g fill="#3da9fc"><!-- pin dots -->
    <circle cx="270" cy="185" r="4"/><circle cx="270" cy="220" r="4"/>
    <circle cx="270" cy="255" r="4"/><circle cx="270" cy="290" r="4"/>
    <circle cx="270" cy="325" r="4"/><circle cx="270" cy="360" r="4"/>
    <circle cx="270" cy="395" r="4"/>
    <circle cx="270" cy="445" r="4" fill="#f87171"/><circle cx="270" cy="475" r="4" fill="#bbb"/>
  </g>

  <!-- Components column -->
  <!-- Alt servo -->
  <rect x="560" y="160" width="260" height="56" rx="8" fill="#1d3a2b" stroke="#34d399" stroke-width="1.5"/>
  <text x="575" y="185" fill="#d6ffe9" font-size="14" font-weight="700">ALT SG90 (tarama)</text>
  <text x="575" y="204" fill="#8fb8a3" font-size="11">sinyal→D9 · +5V(harici) · GND</text>

  <!-- Üst servo -->
  <rect x="560" y="226" width="260" height="56" rx="8" fill="#1d3a2b" stroke="#34d399" stroke-width="1.5"/>
  <text x="575" y="251" fill="#d6ffe9" font-size="14" font-weight="700">ÜST SG90 (nişan)</text>
  <text x="575" y="270" fill="#8fb8a3" font-size="11">sinyal→D10 · +5V(harici) · GND</text>

  <!-- Flame sensor -->
  <rect x="560" y="292" width="260" height="56" rx="8" fill="#3a1f1f" stroke="#f87171" stroke-width="1.5"/>
  <text x="575" y="317" fill="#ffd9d9" font-size="14" font-weight="700">ALEV SENSÖRÜ</text>
  <text x="575" y="336" fill="#caa" font-size="11">AO→A0 · (DO→D2 ops.) · VCC 5V · GND</text>

  <!-- Relay + pump -->
  <rect x="560" y="358" width="260" height="62" rx="8" fill="#33304a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="575" y="382" fill="#ffeab0" font-size="14" font-weight="700">1-KANAL RÖLE → POMPA</text>
  <text x="575" y="400" fill="#cbb88f" font-size="11">IN→D7 · VCC 5V · GND</text>
  <text x="575" y="414" fill="#cbb88f" font-size="11">COM/NO ↔ pompa + harici güç</text>

  <!-- LEDs -->
  <rect x="560" y="430" width="125" height="50" rx="8" fill="#2a1d1d" stroke="#f87171" stroke-width="1.5"/>
  <text x="575" y="452" fill="#ffd9d9" font-size="12" font-weight="700">LED kırmızı</text>
  <text x="575" y="470" fill="#caa" font-size="10.5">D5 →220Ω→ GND</text>

  <rect x="695" y="430" width="125" height="50" rx="8" fill="#1d2a1d" stroke="#34d399" stroke-width="1.5"/>
  <text x="710" y="452" fill="#d6ffe9" font-size="12" font-weight="700">LED yeşil</text>
  <text x="710" y="470" fill="#9c9" font-size="10.5">D6 →220Ω→ GND</text>

  <!-- External PSU -->
  <rect x="300" y="540" width="300" height="70" rx="10" fill="#23120f" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="568" fill="#ffd9a0" font-size="15" font-weight="800" text-anchor="middle">HARİCİ 5V GÜÇ (servo + pompa)</text>
  <text x="450" y="590" fill="#d8b58a" font-size="11.5" text-anchor="middle">+5V → servolar/pompa · GND → Arduino GND ile ORTAK</text>

  <!-- signal wires from pins to components -->
  <g stroke-width="2.5" fill="none">
    <path d="M274 185 H 540 V 188 H 560" stroke="#34d399"/><!-- D9 alt servo -->
    <path d="M274 220 H 520 V 254 H 560" stroke="#34d399"/><!-- D10 üst servo -->
    <path d="M274 255 H 500 V 320 H 560" stroke="#f87171"/><!-- A0 flame -->
    <path d="M274 290 H 480 V 332 H 560" stroke="#f59e0b" stroke-dasharray="5 4"/><!-- D2 flame DO ops -->
    <path d="M274 325 H 460 V 384 H 560" stroke="#fbbf24"/><!-- D7 relay -->
    <path d="M274 360 H 440 V 452 H 560" stroke="#f87171"/><!-- D5 led -->
    <path d="M274 395 H 420 V 452 H 695" stroke="#34d399"/><!-- D6 led -->
  </g>

  <!-- 5V/GND distribution (Arduino 5V powers logic; external powers motors) -->
  <g stroke-width="2.5" fill="none">
    <path d="M274 445 H 360 V 360 H 560" stroke="#f87171" opacity="0.55"/><!-- arduino 5V to relay/sensor logic -->
    <path d="M274 475 H 300 V 560 H 300" stroke="#bbb"/><!-- arduino GND to PSU GND (common) -->
    <path d="M600 575 H 840 V 188 H 820" stroke="#f87171" opacity="0.7"/><!-- PSU +5V up to servos -->
    <path d="M600 560 H 850 V 254 H 820" stroke="#bbb" opacity="0.7"/><!-- PSU GND to components -->
  </g>

  <text x="305" y="535" fill="#bbb" font-size="11">GND ORTAK</text>
  <text x="845" y="150" fill="#f59e0b" font-size="11" text-anchor="end">harici +5V</text>
</svg>
