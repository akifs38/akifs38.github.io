<svg xmlns="http://www.w3.org/2000/svg" width="320" height="400" viewBox="0 0 320 400" font-family="system-ui, Arial">
  <text x="160" y="24" font-size="15" font-weight="800" text-anchor="middle">ESP32 Kutusu — üstten görünüş</text>
  <text x="160" y="42" font-size="10.5" fill="#555" text-anchor="middle">açık üst · kart standoff'larda · etrafı kablo boşluğu</text>
  <g transform="translate(60,60) scale(2.6)">
    <!-- dış kutu -->
    <rect x="0" y="0" width="67.5" height="81.3" fill="#e9edf3" stroke="#333" stroke-width="1"/>
    <!-- iç boşluk -->
    <rect x="2.5" y="2.5" width="62.5" height="76.3" fill="#f7f9fc" stroke="#bbb" stroke-width="0.5"/>
    <!-- ESP32 kartı -->
    <rect x="7.5" y="26.5" width="51.5" height="28.3" fill="#2b6" opacity="0.35" stroke="#1a7a3a" stroke-width="0.8"/>
    <text x="33" y="42" font-size="6" text-anchor="middle" fill="#155">ESP32</text>
    <!-- standoff'lar -->
    <g fill="#888">
      <circle cx="10.5" cy="29.5" r="2"/><circle cx="56" cy="29.5" r="2"/>
      <circle cx="10.5" cy="51.8" r="2"/><circle cx="56" cy="51.8" r="2"/>
    </g>
    <!-- USB penceresi (-X duvar) -->
    <rect x="-0.5" y="34.6" width="3.5" height="12" fill="#fff" stroke="#c33" stroke-width="0.8"/>
    <text x="-3" y="41" font-size="5" text-anchor="end" fill="#c33">USB</text>
    <!-- kablo çıkış çentikleri -->
    <rect x="64" y="31.6" width="4" height="18" fill="#fff" stroke="#39c" stroke-width="0.7"/>
    <rect x="24.7" y="77.8" width="18" height="4" fill="#fff" stroke="#39c" stroke-width="0.7"/>
    <rect x="24.7" y="-0.5" width="18" height="4" fill="#fff" stroke="#39c" stroke-width="0.7"/>
    <!-- kablo boşluğu etiketi -->
    <text x="33" y="14" font-size="5.5" text-anchor="middle" fill="#39c">kablo boşluğu</text>
    <text x="33" y="70" font-size="5.5" text-anchor="middle" fill="#39c">kablo boşluğu</text>
  </g>
</svg>
